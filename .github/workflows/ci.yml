name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / stable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test suite
        run: cargo test --all-targets --all-features

      - name: Pathological fixtures regression
        run: cargo test --test p3_pathological_fixture_regression

      - name: Bench compile check
        run: cargo bench --bench nbt_throughput --no-run
